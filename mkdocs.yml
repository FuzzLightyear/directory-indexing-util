# Documentation site: mkdocs-material rendering the README, changelog,
# security policy, and the numpydoc API reference. Built and deployed by
# .github/workflows/docs.yml; demo GIFs are rendered there from VHS tapes.
site_name: directory-indexing-util
site_description: Performant, security-minded directory scanning, hashing, and indexing.
site_url: https://fuzzlightyear.github.io/directory-indexing-util/
repo_url: https://github.com/FuzzLightyear/directory-indexing-util
repo_name: FuzzLightyear/directory-indexing-util
edit_uri: ""

theme:
  name: material
  icon:
    logo: material/folder-search
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.top
    - navigation.footer

exclude_docs: |
  demos/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            heading_level: 3
            show_root_heading: true
            show_root_full_path: false
            separate_signature: true
            show_signature_annotations: true
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.snippets:
      check_paths: true

nav:
  - Home: index.md
  - CLI Usage: usage.md
  - Python Library: library.md
  - Changelog: changelog.md
  - Security: security.md
